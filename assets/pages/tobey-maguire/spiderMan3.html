  <body>
    <div class="s-wrapper">
      <div class="s-left-column">
        <nav class="navigator">
          <div class="navigator__icon">
            <a href="/index.html">
              <img src="/assets/images/icons/spiderman1.png" alt="" />

          <ul>

            <li><a href="spiderMan3.html">03</a></li>
          </ul>
        </nav>
      </div>
      <div class="s-main-content s-spiderman-01-03">
        <div class="s-main-content__top">
          <div class="s-logo">
            <img
              src="./../../images/spiderman-tobey/movie-03/logo.png"
              alt="Spider Man (2007)"
              title="SpiderMan (2007)"
            />
          </div>
          <div class="s-description">
            <div class="pills">
              <ul>
                <li>Ano: 2007</li>
                <li>Diretor: Sam Raimi</li>
              </ul>
            </div>
            <div class="s-description__text">
              <p>
                <strong>Sinopse:</strong>&nbsp;No terceiro filme da trilogia,

              </p>

          </div>
          <div class="s-links">
            <ul>
              <li>
                <a
                  href="https://www.youtube.com/watch?v=e5wUilOeOmg"
                  class="link-button"
                  target="_blank"
                >
                  <span class="icon">
                    <div class="play-icon">&nbsp;</div>
                  </span>
                  <span class="label"> Assistir Trailer </span>
                </a>
              </li>
            </ul>
          </div>
        </div>

        <div class="s-main-content__bottom">
          <div class="gallery">
            <ul>
              <li>
                <a
                  href="../../images/spiderman-tobey/movie-03/gallery/image-01.png"
                  data-fancybox="gallery"
                  ><img
                    src="../../images/spiderman-tobey/movie-03/gallery/image-01.png"
                    alt=""
                /></a>
              </li>
              <li>

              <li>

                  data-fancybox="gallery"
                  ><img
                    src="../../images/spiderman-tobey/movie-03/gallery/image-03.png"
                    alt=""
                /></a>
              </li>
            </ul>
          </div>
        </div>
